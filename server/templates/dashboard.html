<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QVC Server Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Apply saved theme before first paint to avoid flash -->
  <script>(function(){var t=localStorage.getItem('qvc-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    /* ── Themes ─────────────────────────────────────────────────────────────── */
    :root {
      --bg:        #111111;
      --panel-bg:  #1A1A1A;
      --text:      #EEEEEE;
      --muted:     #777777;
      --card-bg:   rgba(238, 238, 238, 0.05);
      --border:    rgba(238, 238, 238, 0.12);
      --accent:    #6699EE;
      --danger:    #EE5555;
      --success:   #44BB77;
      --warning:   #DDAA33;
      --log-debug: #666666;
      --log-info:  #DDDDDD;
      --log-warn:  #DDAA33;
      --log-error: #EE5555;
      --log-critical: #EE5555;
      --focus-ring:#6699EE;
    }
    [data-theme="light"] {
      --bg:        #FFFFFF;
      --panel-bg:  #FAFAFA;
      --text:      #111111;
      --muted:     #888888;
      --card-bg:   rgba(17, 17, 17, 0.04);
      --border:    rgba(17, 17, 17, 0.14);
      --accent:    #2255CC;
      --danger:    #CC3333;
      --success:   #1A7A42;
      --warning:   #CC8800;
      --log-debug: #888888;
      --log-warn:  #CC8800;
      --log-error: #CC3333;
      --focus-ring:#2255CC;
    }

    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }

    /* ── Root layout: header / middle / logs ────────────────────────────────── */
    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: "IBM Plex Mono", monospace;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }
    body {
      display: grid;
      grid-template-rows: 58px 1fr 32vh;
      -webkit-font-smoothing: none;
      font-smooth: never;
    }

    /* ── Header bar ─────────────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-bg);
      transition: background 0.2s, border-color 0.2s;
      overflow: hidden;
    }
    #topbar-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .topbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* inline stat chips */
    .stats-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.2;
    }
    .stat .s-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .stat .s-value {
      font-size: 0.88rem;
      font-weight: 600;
    }
    .stat-sep { color: var(--border); font-size: 1.2rem; }

    /* config chips */
    #config-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #config-inline .cfg-val { color: var(--text); font-weight: 500; font-family: "IBM Plex Mono", monospace; font-size: 0.72rem; }

    /* push controls to right */
    .topbar-spacer { flex: 1; }

    .topbar-btn {
      padding: 5px 13px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .topbar-btn:hover { background: var(--card-bg); }
    .topbar-btn-danger { border-color: var(--danger); color: var(--danger); }
    .topbar-btn-danger:hover { background: rgba(238,85,85,0.1); }

    /* ── Middle row: users | events ─────────────────────────────────────────── */
    #middle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 14px 18px;
    }
    .panel + .panel { border-left: 1px solid var(--border); }

    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .panel-scroll {
      flex: 1;
      overflow-y: auto;
    }

    /* ── Log section ────────────────────────────────────────────────────────── */
    #log-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 10px 18px 12px;
    }
    #log-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    #log-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    #log-file {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #log-viewer {
      flex: 1;
      overflow-y: auto;
      background: rgba(0,0,0,0.15);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 8px 12px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-info    { color: var(--log-info); }
    .log-debug   { color: var(--log-debug); }
    .log-warning { color: var(--log-warn); }
    .log-error   { color: var(--log-error); }

    /* ── Tables ─────────────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th {
      text-align: left;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      position: sticky;
      top: 0;
      background: var(--bg);
    }
    [data-theme="light"] th { background: var(--bg); }
    td { padding: 6px 10px; border-bottom: 1px solid rgba(128,128,128,0.07); vertical-align: middle; }
    .mono { font-family: "IBM Plex Mono", monospace; font-size: 0.78rem; }
    .empty { color: var(--muted); font-size: 0.85rem; padding: 6px 0; }

    /* ── Badges ─────────────────────────────────────────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 0; font-size: 0.74rem; font-weight: 600; }
    .badge-idle              { color: var(--success); background: rgba(68,187,119,0.14); }
    .badge-connected         { color: var(--accent);  background: rgba(102,153,238,0.14); }
    .badge-user_added        { color: var(--success); background: rgba(68,187,119,0.14); }
    .badge-user_removed      { color: var(--warning); background: rgba(221,170,51,0.14); }
    .badge-peer_connected    { color: var(--accent);  background: rgba(102,153,238,0.14); }
    .badge-peer_disconnected { color: var(--danger);  background: rgba(238,85,85,0.14); }

    /* ── Action buttons ─────────────────────────────────────────────────────── */
    .btn { padding: 2px 9px; border-radius: 0; border: 1px solid; background: transparent; cursor: pointer; font-size: 0.74rem; font-weight: 500; font-family: inherit; margin-right: 3px; transition: background 0.12s; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-warn   { color: var(--warning); border-color: var(--warning); }
    .btn-warn:hover:not(:disabled)   { background: rgba(221,170,51,0.12); }
    .btn-danger { color: var(--danger);  border-color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: rgba(238,85,85,0.12); }

    /* ── Error banner ───────────────────────────────────────────────────────── */
    .error-msg { background: rgba(198,40,40,0.1); border: 1px solid var(--danger); color: var(--danger); padding: 7px 12px; border-radius: 0; margin-bottom: 10px; font-size: 0.82rem; }

    /* ── Scrollbar ──────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
  </style>
</head>
<body>

<!-- ── Top bar ───────────────────────────────────────────────────────────────── -->
<header id="topbar" role="banner">
  <span id="topbar-title">QVC Server</span>

  <div class="topbar-divider" aria-hidden="true"></div>

  <div class="stats-row" aria-label="Server status">
    <div class="stat">
      <span class="s-label">Uptime</span>
      <span class="s-value" id="c-uptime" aria-live="polite">—</span>
    </div>
    <span class="stat-sep" aria-hidden="true">·</span>
    <div class="stat">
      <span class="s-label">State</span>
      <span class="s-value" id="c-state" aria-live="polite">—</span>
    </div>
    <span class="stat-sep" aria-hidden="true">·</span>
    <div class="stat">
      <span class="s-label">Users</span>
      <span class="s-value" id="c-users" aria-live="polite">—</span>
    </div>
    <span class="stat-sep" aria-hidden="true">·</span>
    <div class="stat">
      <span class="s-label">Calls</span>
      <span class="s-value" id="c-calls" aria-live="polite">—</span>
    </div>
  </div>

  <div class="topbar-divider" aria-hidden="true"></div>

  <div id="config-inline" aria-label="Server configuration">
    <span>IP</span><span class="cfg-val" id="cfg-ip">—</span>
    <span>·</span>
    <span>REST</span><span class="cfg-val" id="cfg-rest">—</span>
    <span>·</span>
    <span>WS</span><span class="cfg-val" id="cfg-ws">—</span>
  </div>

  <div class="topbar-spacer"></div>

  <div id="topbar-error" role="alert" aria-live="assertive" style="font-size:0.78rem;color:var(--danger);"></div>

  <button type="button" class="topbar-btn" id="theme-toggle" aria-label="Switch to light mode"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Light</button>
  <button type="button" class="topbar-btn topbar-btn-danger" id="shutdown-btn" aria-label="Shut down the server">Shutdown</button>
</header>

<!-- ── Middle row ────────────────────────────────────────────────────────────── -->
<div id="middle-row">

  <!-- Users panel -->
  <section class="panel" aria-label="Connected users">
    <p class="panel-title">Users</p>
    <div id="users-error" role="alert" aria-live="assertive"></div>
    <div class="panel-scroll" id="users-container">
      <p class="empty">No users connected.</p>
    </div>
  </section>

  <!-- Events panel -->
  <section class="panel" aria-label="Recent events">
    <p class="panel-title">Recent Events</p>
    <div id="events-error" role="alert" aria-live="assertive"></div>
    <div class="panel-scroll" id="events-container">
      <p class="empty">No events yet.</p>
    </div>
  </section>

</div>

<!-- ── Log section ────────────────────────────────────────────────────────────── -->
<section id="log-section" aria-label="Server logs">
  <div id="log-header">
    <span id="log-section-title">Logs</span>
    <span id="log-file"></span>
    <div id="logs-error" role="alert" aria-live="assertive" style="font-size:0.78rem;"></div>
  </div>
  <div id="log-viewer" role="log" aria-label="Server log output" aria-live="off" tabindex="0"></div>
</section>

<script>
  // ── Theme ──────────────────────────────────────────────────────────────────
  var _theme = document.documentElement.getAttribute('data-theme') || 'dark';

  function applyTheme(t) {
    _theme = t;
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('qvc-theme', t);
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    if (t === 'dark') {
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Light';
      btn.setAttribute('aria-label', 'Switch to light mode');
    } else {
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Dark';
      btn.setAttribute('aria-label', 'Switch to dark mode');
    }
  }
  applyTheme(_theme);
  document.getElementById('theme-toggle').addEventListener('click', function () {
    applyTheme(_theme === 'dark' ? 'light' : 'dark');
  });

  // ── Shutdown ───────────────────────────────────────────────────────────────
  document.getElementById('shutdown-btn').addEventListener('click', function () {
    if (!confirm('Shut down the QVC server?')) return;
    fetch('/admin/shutdown', { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function ()  { document.getElementById('topbar-error').textContent = 'Server shutting down…'; })
      .catch(function (e){ document.getElementById('topbar-error').textContent = 'Shutdown failed: ' + e.message; });
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatUptime(s) {
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + sec + 's';
    return sec + 's';
  }
  function showError(id, msg) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = msg ? '<div class="error-msg">' + esc(msg) + '</div>' : '';
  }
  function logClass(line) {
    if (/\(ERROR\)|ERROR/.test(line))     return 'log-error';
    if (/\(WARNING\)|WARNING/.test(line)) return 'log-warning';
    if (/\(DEBUG\)/.test(line))           return 'log-debug';
    return 'log-info';
  }
  function badgeClass(val) { return 'badge badge-' + val.toLowerCase().replace(/\s/g, '_'); }

  // ── API ────────────────────────────────────────────────────────────────────
  function apiFetch(path) {
    return fetch(path).then(function (r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    });
  }
  function apiPost(path) {
    return fetch(path, { method: 'POST' }).then(function (r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    });
  }

  // ── Status + config ────────────────────────────────────────────────────────
  function refreshStatus() {
    apiFetch('/admin/status').then(function (d) {
      showError('topbar-error', '');
      document.getElementById('c-uptime').textContent = formatUptime(d.uptime_seconds);
      document.getElementById('c-state').textContent  = d.api_state;
      document.getElementById('c-users').textContent  = d.user_count;
      document.getElementById('c-calls').textContent  = d.call_count != null ? d.call_count : 0;
      if (d.config) {
        document.getElementById('cfg-ip').textContent   = d.config.local_ip       || '—';
        document.getElementById('cfg-rest').textContent = d.config.rest_port      || '—';
        document.getElementById('cfg-ws').textContent   = d.config.websocket_port || '—';
      }
    }).catch(function (e) {
      showError('topbar-error', 'Server unreachable: ' + e.message);
    });
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  function refreshEvents() {
    apiFetch('/admin/events?limit=20').then(function (d) {
      showError('events-error', '');
      var events = d.events.slice().reverse();
      if (!events.length) {
        document.getElementById('events-container').innerHTML = '<p class="empty">No events yet.</p>';
        return;
      }
      var rows = events.map(function (ev) {
        var details = Object.keys(ev)
          .filter(function (k) { return k !== 'timestamp' && k !== 'event'; })
          .map(function (k) { return esc(k) + '=' + esc(String(ev[k])); })
          .join(', ');
        return '<tr>'
          + '<td class="mono">' + esc(new Date(ev.timestamp).toLocaleTimeString()) + '</td>'
          + '<td><span class="' + badgeClass(ev.event) + '">' + esc(ev.event) + '</span></td>'
          + '<td class="mono">' + details + '</td>'
          + '</tr>';
      }).join('');
      document.getElementById('events-container').innerHTML =
        '<table aria-label="Recent server events"><thead><tr>'
        + '<th scope="col">Time</th><th scope="col">Event</th><th scope="col">Details</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }).catch(function (e) { showError('events-error', e.message); });
  }

  // ── Users ──────────────────────────────────────────────────────────────────
  function refreshUsers() {
    apiFetch('/admin/users').then(function (d) {
      showError('users-error', '');
      var entries = Object.keys(d.users).map(function (id) { return [id, d.users[id]]; });
      if (!entries.length) {
        document.getElementById('users-container').innerHTML = '<p class="empty">No users connected.</p>';
        return;
      }
      var rows = entries.map(function (pair) {
        var id = pair[0], u = pair[1], safeId = esc(id);
        return '<tr>'
          + '<td class="mono">' + safeId + '</td>'
          + '<td class="mono">' + esc(u.api_endpoint) + '</td>'
          + '<td><span class="' + badgeClass(u.state) + '">' + esc(u.state) + '</span></td>'
          + '<td class="mono">' + (u.peer ? esc(u.peer) : '—') + '</td>'
          + '<td>'
          + '<button type="button" class="btn btn-warn" onclick="doDisconnect(\'' + safeId + '\')"'
          + (u.peer ? '' : ' disabled') + '>Disconnect</button>'
          + '<button type="button" class="btn btn-danger" onclick="doRemove(\'' + safeId + '\')">Remove</button>'
          + '</td></tr>';
      }).join('');
      document.getElementById('users-container').innerHTML =
        '<table aria-label="Connected users"><thead><tr>'
        + '<th>ID</th><th>Endpoint</th><th>State</th><th>Peer</th><th>Actions</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }).catch(function (e) { showError('users-error', e.message); });
  }

  function doDisconnect(id) {
    apiPost('/admin/disconnect/' + id).then(refreshUsers)
      .catch(function (e) { showError('users-error', 'Disconnect failed: ' + e.message); });
  }
  function doRemove(id) {
    apiPost('/admin/remove/' + id).then(refreshUsers)
      .catch(function (e) { showError('users-error', 'Remove failed: ' + e.message); });
  }

  // ── Logs ───────────────────────────────────────────────────────────────────
  var _logAutoScroll = true;
  var logEl = document.getElementById('log-viewer');

  logEl.addEventListener('scroll', function () {
    _logAutoScroll = (logEl.scrollTop + logEl.clientHeight) >= (logEl.scrollHeight - 10);
  }, { passive: true });

  function refreshLogs() {
    apiFetch('/admin/logs?lines=300').then(function (d) {
      showError('logs-error', '');
      document.getElementById('log-file').textContent = d.file ? d.file : '';
      if (!d.lines.length) {
        logEl.innerHTML = '<span class="log-debug">No log lines available.</span>';
        return;
      }
      logEl.innerHTML = d.lines.map(function (line) {
        return '<span class="' + logClass(line) + '">' + esc(line) + '\n</span>';
      }).join('');
      if (_logAutoScroll) logEl.scrollTop = logEl.scrollHeight;
    }).catch(function (e) { showError('logs-error', e.message); });
  }

  // ── Polling ────────────────────────────────────────────────────────────────
  refreshStatus(); refreshEvents(); refreshUsers(); refreshLogs();

  var statusId = setInterval(refreshStatus, 10000);
  var eventsId = setInterval(refreshEvents, 10000);
  var usersId  = setInterval(refreshUsers,  10000);
  var logsId   = setInterval(refreshLogs,    5000);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      clearInterval(statusId); clearInterval(eventsId);
      clearInterval(usersId);  clearInterval(logsId);
    } else {
      refreshStatus(); refreshEvents(); refreshUsers(); refreshLogs();
      statusId = setInterval(refreshStatus, 10000);
      eventsId = setInterval(refreshEvents, 10000);
      usersId  = setInterval(refreshUsers,  10000);
      logsId   = setInterval(refreshLogs,    5000);
    }
  });
</script>
</body>
</html>
