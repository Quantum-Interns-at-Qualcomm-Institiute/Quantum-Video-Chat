services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "127.0.0.1:5050:5050"
      - "127.0.0.1:3000:3000"
    environment:
      QVC_SERVER_REST_PORT: "5050"
      QVC_SERVER_WS_PORT: "3000"
      QVC_LOCAL_IP: "0.0.0.0"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/admin/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client-a:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      QUANTUM_SERVER_HOST: server
      QUANTUM_SERVER_PORT: "5050"
    command: ["python", "middleware/client.py", "--port", "5001"]
    depends_on:
      server:
        condition: service_healthy

  client-b:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "127.0.0.1:5002:5002"
    environment:
      QUANTUM_SERVER_HOST: server
      QUANTUM_SERVER_PORT: "5050"
    command: ["python", "middleware/client.py", "--port", "5002"]
    depends_on:
      server:
        condition: service_healthy
