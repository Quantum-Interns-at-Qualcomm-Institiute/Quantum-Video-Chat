services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "127.0.0.1:${QVC_SERVER_PORT}:${QVC_SERVER_PORT}"
    environment:
      QVC_SERVER_REST_PORT: "${QVC_SERVER_PORT}"
      QVC_LOCAL_IP: "0.0.0.0"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${QVC_SERVER_PORT}/admin/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client-a:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "127.0.0.1:${QVC_CLIENT_A_PORT}:${QVC_CLIENT_A_PORT}"
    environment:
      QUANTUM_SERVER_HOST: server
      QUANTUM_SERVER_PORT: "${QVC_SERVER_PORT}"
    command: ["python", "middleware/client.py", "--port", "${QVC_CLIENT_A_PORT}"]
    depends_on:
      server:
        condition: service_healthy

  client-b:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "127.0.0.1:${QVC_CLIENT_B_PORT}:${QVC_CLIENT_B_PORT}"
    environment:
      QUANTUM_SERVER_HOST: server
      QUANTUM_SERVER_PORT: "${QVC_SERVER_PORT}"
    command: ["python", "middleware/client.py", "--port", "${QVC_CLIENT_B_PORT}"]
    depends_on:
      server:
        condition: service_healthy
