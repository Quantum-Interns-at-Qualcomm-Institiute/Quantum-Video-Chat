services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "127.0.0.1:${QVC_SERVER_REST_PORT:-5050}:${QVC_SERVER_REST_PORT:-5050}"
    environment:
      QVC_SERVER_REST_PORT: ${QVC_SERVER_REST_PORT:-5050}
      QVC_LOCAL_IP: "0.0.0.0"
      DEV_CERT_DIR: ""
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${QVC_SERVER_REST_PORT:-5050}/admin/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    command: ["python", "middleware/client.py", "--port", "${QVC_MIDDLEWARE_PORT:-5002}"]
    ports:
      - "127.0.0.1:${QVC_MIDDLEWARE_PORT:-5002}:${QVC_MIDDLEWARE_PORT:-5002}"
    environment:
      QUANTUM_SERVER_HOST: server
      QUANTUM_SERVER_PORT: ${QVC_SERVER_REST_PORT:-5050}
      DEV_CERT_DIR: ""
    depends_on:
      server:
        condition: service_healthy
