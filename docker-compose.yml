services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "127.0.0.1:${QVC_SERVER_REST_PORT:-5050}:${QVC_SERVER_REST_PORT:-5050}"
      - "127.0.0.1:${QVC_SERVER_WS_PORT:-3000}:${QVC_SERVER_WS_PORT:-3000}"
    environment:
      QVC_SERVER_REST_PORT: ${QVC_SERVER_REST_PORT:-5050}
      QVC_SERVER_WS_PORT: ${QVC_SERVER_WS_PORT:-3000}
      QVC_LOCAL_IP: "0.0.0.0"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${QVC_SERVER_REST_PORT:-5050}/admin/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  middleware:
    build:
      context: .
      dockerfile: Dockerfile.middleware
    ports:
      - "127.0.0.1:${QVC_MIDDLEWARE_PORT:-5001}:${QVC_MIDDLEWARE_PORT:-5001}"
    environment:
      QUANTUM_SERVER_HOST: server
      QUANTUM_SERVER_PORT: ${QVC_SERVER_REST_PORT:-5050}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${QVC_MIDDLEWARE_PORT:-5001}/socket.io/?EIO=4&transport=polling"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:${QVC_FRONTEND_PORT:-1212}:${QVC_FRONTEND_PORT:-1212}"
    environment:
      PORT: ${QVC_FRONTEND_PORT:-1212}
    volumes:
      - ./frontend/src:/app/src
