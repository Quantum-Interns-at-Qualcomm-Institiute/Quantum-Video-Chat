name: Render PlantUML Diagrams

on:
  push:
    paths:
      - 'docs/diagrams/**/*.puml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download PlantUML
        run: |
          mkdir -p /tmp/plantuml
          curl -L -o /tmp/plantuml/plantuml.jar \
            https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Render diagrams to SVG
        run: |
          java -jar /tmp/plantuml/plantuml.jar \
            -tsvg \
            -o "${{ github.workspace }}/docs/diagrams" \
            docs/diagrams/*.puml

      - name: Render diagrams to PNG (fallback)
        run: |
          java -jar /tmp/plantuml/plantuml.jar \
            -tpng \
            -o "${{ github.workspace }}/docs/diagrams" \
            docs/diagrams/*.puml

      - name: Commit rendered diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/*.svg docs/diagrams/*.png
          if git diff --cached --quiet; then
            echo "No diagram changes to commit."
          else
            git commit -m "docs: re-render PlantUML diagrams [skip ci]"
            git push
          fi
